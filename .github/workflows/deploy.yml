name: Sync & Deploy
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: npm install
      - name: Sync from Yuque
        env:
          YUQUE_TOKEN: ${{ secrets.YUQUE_TOKEN }}
          YUQUE_LOGIN: ${{ secrets.YUQUE_LOGIN }}
          YUQUE_REPO: ${{ secrets.YUQUE_REPO }}
        run: npm run elog:sync
      - name: Commit sync
        run: |
          git config user.name "Actions" && git config user.email "actions@github.com"
          git add docs/docs/ docs/images/ elog.cache.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "sync" && git push)
      - run: npm run docs:build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs/.vitepress/dist }
      - id: deployment
        uses: actions/deploy-pages@v4
